<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest HUD</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Scanlines Overlay -->
    <div class="scanlines"></div>

    <!-- Hero Section -->
    <header class="hero">
        <h1 id="title" class="title"><span>PIXEL QUEST</span></h1>
        <p>Welcome to Pixel Quest!</p>
    </header>

    <!-- Cards Section -->
    <div class="container">
        <div class="card">
            <div class="icon float">
                <img src="images/controller.png" alt="Game controller icon">
            </div>
            <p>CONTROL</p>
        </div>

        <div class="card">
            <div class="icon pulse">
                <img src="images/heart.png" alt="Health heart icon">
            </div>
            <p>HEALTH</p>
        </div>

        <div class="card">
            <div class="icon spin">
                <img src="images/star.png" alt="Power star icon">
            </div>
            <p>POWER</p>
        </div>
    </div>

    <!-- Start Button Section -->
    <div class="start-section">
        <p class="subtitle">CHECK YOUR STATS BEFORE STARTING</p>
        <button class="start-btn">START GAME</button>
    </div>

    <!-- Footer -->
    <footer>
        <p class="footer-text">© 2026 Pixel Quest. Adventure awaits.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
